
<style>
@import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap');

:root {
  --bg: #0e0e16;
  --surface: #16161f;
  --surface2: #1e1e2a;
  --border: #2a2a3c;
  --gold: #f0a030;
  --gold2: #ffcf6b;
  --text: #eeeef8;
  --muted: #7878a0;
  --red: #ff5a5a;
  --green: #4ae09a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

#wrap {
  font-family: 'Kanit', 'Noto Sans Thai', sans-serif;
  background: var(--bg);
  min-height: 100%;
  color: var(--text);
  padding: 0;
}

/* HEADER */
#hdr {
  background: linear-gradient(135deg, #1a1228 0%, #0e1620 100%);
  border-bottom: 1px solid var(--border);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
#hdr .logo {
  display: flex; align-items: center; gap: 10px;
}
#hdr .logo .icon {
  width: 38px; height: 38px; border-radius: 10px;
  background: linear-gradient(135deg, var(--gold), #ff8c42);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
  box-shadow: 0 4px 14px rgba(240,160,48,0.4);
}
#hdr h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.3px; }
#hdr p { font-size: 11px; color: var(--muted); margin-top: 1px; }
#dlBtn {
  background: linear-gradient(135deg, var(--gold), #ff8c42);
  color: #0e0e16; border: none; border-radius: 10px;
  padding: 8px 16px; font-size: 13px; font-weight: 700;
  font-family: inherit; cursor: pointer; white-space: nowrap;
  box-shadow: 0 4px 14px rgba(240,160,48,0.35);
  transition: all 0.2s; flex-shrink: 0;
}
#dlBtn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(240,160,48,0.5); }
#dlBtn:active { transform: translateY(0); }

/* MAIN */
#main { padding: 14px; display: flex; flex-direction: column; gap: 12px; }

/* UPLOAD ZONE */
#uz {
  border: 1.5px dashed var(--border);
  border-radius: 16px;
  padding: 20px 16px;
  text-align: center;
  cursor: pointer;
  background: var(--surface);
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
#uz::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(circle at 50% 0%, rgba(240,160,48,0.06) 0%, transparent 70%);
  pointer-events: none;
}
#uz:hover, #uz.dov {
  border-color: var(--gold);
  background: #1c1814;
  box-shadow: 0 0 0 3px rgba(240,160,48,0.1);
}
#uz .up-icon {
  width: 52px; height: 52px; border-radius: 14px;
  background: linear-gradient(135deg, rgba(240,160,48,0.15), rgba(255,140,66,0.1));
  border: 1px solid rgba(240,160,48,0.3);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 22px; margin-bottom: 8px;
}
#uz h3 { font-size: 14px; font-weight: 600; color: var(--text); }
#uz p { font-size: 12px; color: var(--muted); margin-top: 3px; }

/* PANELS */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
}
.card-hd {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2);
}
.card-hd .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--gold); flex-shrink: 0;
  box-shadow: 0 0 6px var(--gold);
}
.card-hd span { font-size: 13px; font-weight: 600; letter-spacing: 0.3px; }
.card-body { padding: 12px 14px; }

/* LAYOUT BTNS */
.lay-grid { display: flex; gap: 6px; flex-wrap: wrap; }
.lay-btn {
  flex: 1; min-width: 60px; padding: 7px 8px;
  border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--muted);
  font-family: inherit; font-size: 12px; cursor: pointer;
  transition: all 0.15s; text-align: center; white-space: nowrap;
}
.lay-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(240,160,48,0.08); }

/* TAGS (presets) */
.tags { display: flex; gap: 7px; flex-wrap: wrap; }
.ptag {
  padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text);
  transition: all 0.15s;
}
.ptag:hover {
  border-color: var(--gold); color: var(--gold);
  background: rgba(240,160,48,0.1);
  box-shadow: 0 0 10px rgba(240,160,48,0.2);
  transform: translateY(-1px);
}

/* TEXT INPUT */
.txt-row { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
.txt-row input {
  flex: 1; padding: 8px 12px; border-radius: 9px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); font-family: inherit; font-size: 13px;
  outline: none; transition: border-color 0.15s;
}
.txt-row input:focus { border-color: var(--gold); }
.txt-row input::placeholder { color: var(--muted); }
.add-btn {
  padding: 8px 14px; border-radius: 9px; border: none;
  background: linear-gradient(135deg, var(--gold), #ff8c42);
  color: #0e0e16; font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer; white-space: nowrap; transition: all 0.15s;
}
.add-btn:hover { opacity: 0.85; }

/* STYLE ROW */
.style-row {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--border);
}
.slbl { font-size: 11px; color: var(--muted); white-space: nowrap; }
#fs { accent-color: var(--gold); width: 80px; cursor: pointer; }
#fsv { font-size: 12px; color: var(--gold); min-width: 32px; font-weight: 600; }
#fc {
  width: 28px; height: 28px; border-radius: 7px;
  border: 1px solid var(--border); cursor: pointer;
  background: none; padding: 2px;
}
.s-btn {
  padding: 5px 10px; border-radius: 7px; font-family: inherit;
  font-size: 12px; font-weight: 700; cursor: pointer;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--muted); transition: all 0.15s;
}
.s-btn:hover { border-color: var(--gold); color: var(--gold); }
.s-btn.on { background: rgba(240,160,48,0.15); border-color: var(--gold); color: var(--gold); }
.shadow-wrap { display:flex; align-items:center; gap:5px; cursor:pointer; }
.shadow-wrap input { accent-color: var(--gold); width:14px; height:14px; cursor:pointer; }
.del-btn {
  margin-left: auto; padding: 5px 12px; border-radius: 7px;
  border: 1px solid rgba(255,90,90,0.3); background: rgba(255,90,90,0.08);
  color: var(--red); font-family: inherit; font-size: 12px; cursor: pointer;
  transition: all 0.15s;
}
.del-btn:hover { background: rgba(255,90,90,0.15); }

/* HINT */
#hint {
  text-align: center; font-size: 11px; color: var(--muted);
  padding: 2px 0;
}
#hint b { color: rgba(240,160,48,0.8); }

/* CANVAS WRAP */
#cw {
  display: flex; justify-content: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px;
}
#cv {
  display: block;
  border-radius: 4px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06);
}

/* CHIP LIST */
#il { display: flex; gap: 6px; flex-wrap: wrap; }
.chip {
  display: flex; align-items: center; gap: 5px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 20px; padding: 4px 10px;
  font-size: 11px; color: var(--muted); cursor: pointer;
  transition: border-color 0.15s;
}
.chip:hover { border-color: var(--gold); color: var(--text); }
.rm {
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: 13px; line-height: 1; padding: 0;
}
.rm:hover { color: var(--red); }

/* CLEAR BTN */
.clr-btn {
  padding: 5px 12px; border-radius: 7px;
  border: 1px solid rgba(255,90,90,0.25); background: transparent;
  color: var(--red); font-family: inherit; font-size: 12px; cursor: pointer;
  transition: all 0.15s;
}
.clr-btn:hover { background: rgba(255,90,90,0.08); }
</style>

<div id="wrap">

<div id="hdr">
  <div class="logo">
    <div class="icon">📄</div>
    <div>
      <h1>A4 Image Combiner</h1>
      <p>รวมรูป • ใส่ข้อความ • ดาวน์โหลด JPG</p>
    </div>
  </div>
  <button id="dlBtn" onclick="dl()">⬇ ดาวน์โหลด JPG</button>
</div>

<div id="main">

  <!-- UPLOAD -->
  <div id="uz" onclick="document.getElementById('fi').click()"
    ondragover="event.preventDefault();this.classList.add('dov')"
    ondragleave="this.classList.remove('dov')"
    ondrop="drop(event)">
    <div class="up-icon">🖼️</div>
    <h3>คลิกหรือลากรูปมาวางที่นี่</h3>
    <p>JPG, PNG — เลือกได้หลายรูปพร้อมกัน</p>
    <input type="file" id="fi" multiple accept="image/*" style="display:none" onchange="loadFiles(this.files)">
  </div>

  <!-- LAYOUT -->
  <div class="card">
    <div class="card-hd">
      <div class="dot"></div>
      <span>จัดวางอัตโนมัติ</span>
      <div style="flex:1"></div>
      <button class="clr-btn" onclick="clrAll()">🗑 ล้างทั้งหมด</button>
    </div>
    <div class="card-body">
      <div class="lay-grid">
        <button class="lay-btn" onclick="lay(1)">⬜ 1 รูป</button>
        <button class="lay-btn" onclick="lay('2v')">⬜⬜ 2 แนวตั้ง</button>
        <button class="lay-btn" onclick="lay('2h')">2 แนวนอน</button>
        <button class="lay-btn" onclick="lay(3)">3 รูป</button>
        <button class="lay-btn" onclick="lay(4)">4 รูป</button>
        <button class="lay-btn" onclick="lay('a')">✨ อัตโนมัติ</button>
      </div>
    </div>
  </div>

  <!-- TEXT -->
  <div class="card">
    <div class="card-hd">
      <div class="dot" style="background:#a78bfa;box-shadow:0 0 6px #a78bfa;"></div>
      <span>เพิ่มข้อความ</span>
    </div>
    <div class="card-body">
      <div class="tags">
        <button class="ptag" onclick="addP('Before')">Before</button>
        <button class="ptag" onclick="addP('After')">After</button>
        <button class="ptag" onclick="addP('QT')">QT</button>
        <button class="ptag" onclick="addP('ก่อน')">ก่อน</button>
        <button class="ptag" onclick="addP('หลัง')">หลัง</button>
        <button class="ptag" onclick="addP('✓')">✓</button>
        <button class="ptag" onclick="addP('✗')">✗</button>
        <button class="ptag" onclick="addP('OK')">OK</button>
        <button class="ptag" onclick="addP('NG')">NG</button>
      </div>
      <div class="txt-row">
        <input type="text" id="ti" placeholder="พิมพ์ข้อความที่ต้องการ..." onkeydown="if(event.key==='Enter')addTxt()">
        <button class="add-btn" onclick="addTxt()">+ เพิ่ม</button>
      </div>
      <div class="style-row">
        <span class="slbl">ขนาด</span>
        <input type="range" id="fs" min="10" max="160" value="52" oninput="document.getElementById('fsv').textContent=this.value+'px';updSel()">
        <span id="fsv">52px</span>
        <span class="slbl">สี</span>
        <input type="color" id="fc" value="#ffffff" oninput="updSel()">
        <button class="s-btn" id="bb" onclick="togBold()">B</button>
        <button class="s-btn" id="ib" onclick="togItal()" style="font-style:italic;">I</button>
        <label class="shadow-wrap"><input type="checkbox" id="sh" onchange="updSel()" checked><span class="slbl">เงา</span></label>
        <button class="del-btn" onclick="delSel()">🗑 ลบ</button>
      </div>
    </div>
  </div>

  <!-- HINT -->
  <p id="hint"><b>ลาก</b> รูป/ข้อความเพื่อย้าย &nbsp;•&nbsp; <b>จุดสีน้ำเงิน</b> ที่มุมรูปเพื่อปรับขนาด &nbsp;•&nbsp; <b>Delete</b> เพื่อลบ</p>

  <!-- CANVAS -->
  <div id="cw"><canvas id="cv"></canvas></div>

  <!-- IMG LIST -->
  <div id="il"></div>

</div>
</div>

<script>
const A4W=794,A4H=1123,cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let imgs=[],txts=[],nid=1,sel=null,drag=false,resz=false,ds={},rt=null,sc=0.7;
let bold=false,ital=false;
const HS=10;

function gsc(){return Math.min(((window.innerWidth||680)-56)/A4W,0.82);}
function init(){sc=gsc();cv.width=Math.round(A4W*sc);cv.height=Math.round(A4H*sc);ren();}

function ren(){
  ctx.fillStyle='#fff';ctx.fillRect(0,0,cv.width,cv.height);
  if(!imgs.length&&!txts.length){
    ctx.strokeStyle='#f0f0f0';ctx.lineWidth=1;
    [A4W/3,A4W*2/3].forEach(x=>{ctx.beginPath();ctx.moveTo(x*sc,0);ctx.lineTo(x*sc,cv.height);ctx.stroke();});
    [A4H/3,A4H*2/3].forEach(y=>{ctx.beginPath();ctx.moveTo(0,y*sc);ctx.lineTo(cv.width,y*sc);ctx.stroke();});
    ctx.fillStyle='#ccc';ctx.font=Math.round(13*sc)+'px Kanit,sans-serif';ctx.textAlign='center';
    ctx.fillText('อัพโหลดรูปด้านบนเพื่อเริ่มต้น',cv.width/2,cv.height/2);return;
  }
  for(const im of imgs){
    ctx.save();ctx.beginPath();ctx.rect(im.x*sc,im.y*sc,im.w*sc,im.h*sc);ctx.clip();
    ctx.drawImage(im.el,im.x*sc,im.y*sc,im.w*sc,im.h*sc);ctx.restore();
    if(sel&&sel.t==='i'&&sel.id===im.id){
      ctx.strokeStyle='#f0a030';ctx.lineWidth=2.5;
      ctx.strokeRect(im.x*sc+1,im.y*sc+1,im.w*sc-2,im.h*sc-2);drawH(im);
    }
  }
  for(const t of txts){
    const fs=t.fs*sc,f=(t.ital?'italic ':'')+(t.bold?'bold ':'')+fs+'px Kanit,"Noto Sans Thai",sans-serif';
    ctx.font=f;ctx.textAlign='left';ctx.textBaseline='top';
    if(t.sh){ctx.shadowColor='rgba(0,0,0,0.8)';ctx.shadowBlur=fs*0.35;ctx.shadowOffsetX=fs*0.08;ctx.shadowOffsetY=fs*0.08;}
    ctx.fillStyle=t.col;ctx.fillText(t.txt,t.x*sc,t.y*sc);
    ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;
    if(sel&&sel.t==='x'&&sel.id===t.id){
      const mw=ctx.measureText(t.txt).width;
      ctx.strokeStyle='#f0a030';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
      ctx.strokeRect(t.x*sc-4,t.y*sc-4,mw+8,fs+10);ctx.setLineDash([]);
    }
  }
}

function hlist(im){const x=im.x*sc,y=im.y*sc,w=im.w*sc,h=im.h*sc;return [{x,y,t:'nw'},{x:x+w/2,y,t:'n'},{x:x+w,y,t:'ne'},{x:x+w,y:y+h/2,t:'e'},{x:x+w,y:y+h,t:'se'},{x:x+w/2,y:y+h,t:'s'},{x,y:y+h,t:'sw'},{x,y:y+h/2,t:'w'}];}
function drawH(im){ctx.fillStyle='#f0a030';ctx.strokeStyle='#fff';ctx.lineWidth=1.5;hlist(im).forEach(h=>{ctx.beginPath();ctx.arc(h.x,h.y,HS/2,0,Math.PI*2);ctx.fill();ctx.stroke();});}
function hitH(mx,my,im){for(const h of hlist(im))if(Math.hypot(mx-h.x,my-h.y)<=HS)return h.t;return null;}
function hitI(mx,my){for(let i=imgs.length-1;i>=0;i--){const im=imgs[i];if(mx>=im.x*sc&&mx<=(im.x+im.w)*sc&&my>=im.y*sc&&my<=(im.y+im.h)*sc)return im;}return null;}
function hitX(mx,my){
  for(let i=txts.length-1;i>=0;i--){
    const t=txts[i];const fs=t.fs*sc;
    ctx.font=(t.ital?'italic ':'')+(t.bold?'bold ':'')+fs+'px Kanit,sans-serif';ctx.textBaseline='top';
    const mw=ctx.measureText(t.txt).width;
    if(mx>=t.x*sc-6&&mx<=t.x*sc+mw+6&&my>=t.y*sc-6&&my<=t.y*sc+fs+12)return t;
  }return null;
}
function gpos(e){const r=cv.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return{mx:s.clientX-r.left,my:s.clientY-r.top};}
const CM={nw:'nw-resize',n:'n-resize',ne:'ne-resize',e:'e-resize',se:'se-resize',s:'s-resize',sw:'sw-resize',w:'w-resize'};

function onDn(e){
  const{mx,my}=gpos(e);
  if(sel&&sel.t==='i'){const im=imgs.find(i=>i.id===sel.id);if(im){const h=hitH(mx,my,im);if(h){resz=true;rt=h;ds={mx,my,x:im.x,y:im.y,w:im.w,h:im.h};return;}}}
  const xt=hitX(mx,my);
  if(xt){sel={t:'x',id:xt.id};drag=true;ds={mx,my,ox:xt.x,oy:xt.y};syncC(xt);txts=txts.filter(i=>i.id!==xt.id);txts.push(xt);ren();return;}
  const im=hitI(mx,my);
  if(im){sel={t:'i',id:im.id};drag=true;ds={mx,my,ox:im.x,oy:im.y};imgs=imgs.filter(i=>i.id!==im.id);imgs.push(im);ren();return;}
  sel=null;ren();
}
function onMv(e){
  if(e.cancelable)e.preventDefault();
  const{mx,my}=gpos(e),dx=(mx-ds.mx)/sc,dy=(my-ds.my)/sc;
  if(!drag&&!resz){
    let c='default';
    if(sel&&sel.t==='i'){const im=imgs.find(i=>i.id===sel.id);if(im){const h=hitH(mx,my,im);if(h)c=CM[h];else if(hitI(mx,my)&&hitI(mx,my).id===im.id)c='move';}}
    else if(hitX(mx,my))c='move';else if(hitI(mx,my))c='move';
    cv.style.cursor=c;return;
  }
  if(drag){
    if(sel&&sel.t==='i'){const im=imgs.find(i=>i.id===sel.id);if(im){im.x=Math.max(0,Math.min(A4W-im.w,ds.ox+dx));im.y=Math.max(0,Math.min(A4H-im.h,ds.oy+dy));}}
    else if(sel&&sel.t==='x'){const t=txts.find(i=>i.id===sel.id);if(t){t.x=Math.max(0,Math.min(A4W,ds.ox+dx));t.y=Math.max(0,Math.min(A4H,ds.oy+dy));}}
  }else if(resz&&sel&&sel.t==='i'){
    const im=imgs.find(i=>i.id===sel.id);if(!im)return;
    let{x:ox,y:oy,w:ow,h:oh}=ds,nx=ox,ny=oy,nw=ow,nh=oh;const M=40;
    if(rt.includes('e'))nw=Math.max(M,Math.min(A4W-ox,ow+dx));
    if(rt.includes('s'))nh=Math.max(M,Math.min(A4H-oy,oh+dy));
    if(rt.includes('w')){nw=Math.max(M,ow-dx);nx=ox+ow-nw;}
    if(rt.includes('n')){nh=Math.max(M,oh-dy);ny=oy+oh-nh;}
    im.x=Math.max(0,nx);im.y=Math.max(0,ny);im.w=nw;im.h=nh;
  }
  ren();
}
function onUp(){drag=false;resz=false;rt=null;}
cv.addEventListener('mousedown',onDn);cv.addEventListener('mousemove',onMv);cv.addEventListener('mouseup',onUp);cv.addEventListener('mouseleave',onUp);
cv.addEventListener('touchstart',e=>{if(e.cancelable)e.preventDefault();onDn(e);},{passive:false});
cv.addEventListener('touchmove',onMv,{passive:false});cv.addEventListener('touchend',onUp);
document.addEventListener('keydown',e=>{if((e.key==='Delete'||e.key==='Backspace')&&sel&&document.activeElement.tagName!=='INPUT')delSel();});

function delSel(){if(!sel)return;if(sel.t==='i'){imgs=imgs.filter(i=>i.id!==sel.id);updL();}else txts=txts.filter(i=>i.id!==sel.id);sel=null;ren();}
function addTxt(){const v=document.getElementById('ti').value.trim();if(v){addP(v);document.getElementById('ti').value='';}}
function addP(txt){
  const t={id:nid++,txt,x:30,y:30,fs:parseInt(document.getElementById('fs').value)||52,col:document.getElementById('fc').value||'#ffffff',bold,ital,sh:document.getElementById('sh').checked};
  txts.push(t);sel={t:'x',id:t.id};ren();
}
function syncC(t){
  document.getElementById('fs').value=t.fs;document.getElementById('fsv').textContent=t.fs+'px';
  document.getElementById('fc').value=t.col;document.getElementById('sh').checked=t.sh;
  bold=t.bold;ital=t.ital;
  document.getElementById('bb').classList.toggle('on',bold);
  document.getElementById('ib').classList.toggle('on',ital);
}
function updSel(){
  const fs=parseInt(document.getElementById('fs').value);document.getElementById('fsv').textContent=fs+'px';
  if(sel&&sel.t==='x'){const t=txts.find(i=>i.id===sel.id);if(t){t.fs=fs;t.col=document.getElementById('fc').value;t.sh=document.getElementById('sh').checked;t.bold=bold;t.ital=ital;ren();}}
}
function togBold(){bold=!bold;document.getElementById('bb').classList.toggle('on',bold);if(sel&&sel.t==='x'){const t=txts.find(i=>i.id===sel.id);if(t){t.bold=bold;ren();}}}
function togItal(){ital=!ital;document.getElementById('ib').classList.toggle('on',ital);if(sel&&sel.t==='x'){const t=txts.find(i=>i.id===sel.id);if(t){t.ital=ital;ren();}}}
function loadFiles(files){
  Array.from(files).forEach(f=>{const r=new FileReader();r.onload=ev=>{const el=new Image();el.onload=()=>{imgs.push({el,id:nid++,x:0,y:0,w:A4W,h:A4H,name:f.name});lay('a');updL();};el.src=ev.target.result;};r.readAsDataURL(f);});
  document.getElementById('fi').value='';
}
function drop(e){e.preventDefault();document.getElementById('uz').classList.remove('dov');loadFiles(e.dataTransfer.files);}
function asgn(im,x,y,w,h){im.x=x;im.y=y;im.w=w;im.h=h;}
function lay(t){
  const n=imgs.length;if(!n){ren();return;}
  if(t==='a'){if(n===1)lay(1);else if(n===2)lay('2v');else if(n===3)lay(3);else if(n===4)lay(4);else lay('g');return;}
  if(t===1)asgn(imgs[0],0,0,A4W,A4H);
  else if(t==='2v')imgs.slice(0,2).forEach((im,i)=>asgn(im,i*A4W/2,0,A4W/2,A4H));
  else if(t==='2h')imgs.slice(0,2).forEach((im,i)=>asgn(im,0,i*A4H/2,A4W,A4H/2));
  else if(t===3){asgn(imgs[0],0,0,A4W,A4H/2);if(n>1)asgn(imgs[1],0,A4H/2,A4W/2,A4H/2);if(n>2)asgn(imgs[2],A4W/2,A4H/2,A4W/2,A4H/2);}
  else if(t===4){asgn(imgs[0],0,0,A4W/2,A4H/2);if(n>1)asgn(imgs[1],A4W/2,0,A4W/2,A4H/2);if(n>2)asgn(imgs[2],0,A4H/2,A4W/2,A4H/2);if(n>3)asgn(imgs[3],A4W/2,A4H/2,A4W/2,A4H/2);}
  else{const c=Math.ceil(Math.sqrt(n)),cw=A4W/c,ch=A4H/Math.ceil(n/c);imgs.forEach((im,i)=>asgn(im,(i%c)*cw,Math.floor(i/c)*ch,cw,ch));}
  ren();
}
function clrAll(){imgs=[];txts=[];sel=null;ren();updL();}
function updL(){
  const l=document.getElementById('il');l.innerHTML='';
  imgs.forEach(im=>{
    const d=document.createElement('div');d.className='chip';
    const sp=document.createElement('span');sp.textContent='📷 '+(im.name||'รูป '+im.id);
    const rm=document.createElement('button');rm.className='rm';rm.textContent='✕';
    rm.onclick=ev=>{ev.stopPropagation();imgs=imgs.filter(i=>i.id!==im.id);if(sel&&sel.id===im.id)sel=null;ren();updL();};
    d.onclick=()=>{sel={t:'i',id:im.id};ren();};
    d.append(sp,rm);l.appendChild(d);
  });
}
function dl(){
  if(!imgs.length&&!txts.length){alert('กรุณาอัพโหลดรูปก่อน');return;}
  const ec=document.createElement('canvas');ec.width=A4W;ec.height=A4H;
  const ex=ec.getContext('2d');ex.fillStyle='#fff';ex.fillRect(0,0,A4W,A4H);
  for(const im of imgs){ex.save();ex.beginPath();ex.rect(im.x,im.y,im.w,im.h);ex.clip();ex.drawImage(im.el,im.x,im.y,im.w,im.h);ex.restore();}
  for(const t of txts){
    const f=(t.ital?'italic ':'')+(t.bold?'bold ':'')+t.fs+'px Kanit,"Noto Sans Thai",sans-serif';
    ex.font=f;ex.textAlign='left';ex.textBaseline='top';
    if(t.sh){ex.shadowColor='rgba(0,0,0,0.8)';ex.shadowBlur=t.fs*0.35;ex.shadowOffsetX=t.fs*0.08;ex.shadowOffsetY=t.fs*0.08;}
    ex.fillStyle=t.col;ex.fillText(t.txt,t.x,t.y);
    ex.shadowColor='transparent';ex.shadowBlur=0;ex.shadowOffsetX=0;ex.shadowOffsetY=0;
  }
  const a=document.createElement('a');a.download='a4_combined.jpg';a.href=ec.toDataURL('image/jpeg',0.95);a.click();
}
init();window.addEventListener('resize',init);
</script>
